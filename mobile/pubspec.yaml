name: parkour_notot
description: "Parkour NoToT Family — find spots, chat, train."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Routing
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.5.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # Video player
  video_player: ^2.9.1
  cached_network_image: ^3.4.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
