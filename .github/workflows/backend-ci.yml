name: backend-ci

on:
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: parkour
          POSTGRES_PASSWORD: parkour
          POSTGRES_DB: parkour_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U parkour"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://parkour:parkour@localhost:5432/parkour_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-not-used-in-prod
          ENV: test
        run: pytest -q
