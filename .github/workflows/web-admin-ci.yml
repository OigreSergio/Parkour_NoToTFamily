name: web-admin-ci

on:
  pull_request:
    paths: ["web-admin/**", ".github/workflows/web-admin-ci.yml"]
  push:
    branches: [main]
    paths: ["web-admin/**", ".github/workflows/web-admin-ci.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
