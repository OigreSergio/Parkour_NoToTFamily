name: mobile-ci

on:
  pull_request:
    paths: ["mobile/**", ".github/workflows/mobile-ci.yml"]
  push:
    branches: [main]
    paths: ["mobile/**", ".github/workflows/mobile-ci.yml"]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
